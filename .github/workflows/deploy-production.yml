name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          API_BASE: ${{ secrets.WORKER_URL }}

      - name: Create Cloudflare Pages project (if not exists)
        run: npx -y wrangler pages project create search-dashboard --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages (production)
        run: npx -y wrangler pages deploy www --project-name=search-dashboard --branch=main
