<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Search Operations</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Search Operations</h1>
    <p id="status" class="status">Requesting GPS permission…</p>

    <div id="coordinates" class="coordinates hidden">
      <div class="coord-row">
        <span class="label">Latitude</span>
        <span id="lat" class="value">—</span>
      </div>
      <div class="coord-row">
        <span class="label">Longitude</span>
        <span id="lng" class="value">—</span>
      </div>
      <div class="coord-row">
        <span class="label">Accuracy</span>
        <span id="accuracy" class="value">—</span>
      </div>
      <div class="coord-row">
        <span class="label">Last update</span>
        <span id="timestamp" class="value">—</span>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
